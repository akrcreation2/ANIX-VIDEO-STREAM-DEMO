<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}
.container{
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}
input{
    width:100%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:none;
}
button{
    margin-top:10px;
    padding:12px 25px;
    background:#6d28d9;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
video{
    width:100%;
}
    body{
    margin:0;
    background:linear-gradient(180deg,#0b0b14,#111827,#0b0b14);
    color:#fff;
    font-family:'Segoe UI',sans-serif;
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(18px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.logo{
    text-align:center;
    font-size:42px;
    font-weight:800;
    letter-spacing:2px;
    margin-bottom:25px;
    color:#ffffff;
}

.logo span{
    color:#3b82f6;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#1b1b2f;
    color:white;
    font-size:16px;
    outline:none;
    transition:.3s;
}

input:focus{
    box-shadow:0 0 15px #2563eb;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#2563eb,#1d4ed8);
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(37,99,235,.6);
}

video{
    width:100%;
    margin-top:25px;
    border-radius:18px;
    overflow:hidden;
}
</style>

</head>
<body>

<div class="container">

<h1 class="logo">
ANiX <span>ViDEO STREAM</span>
</h1>
    
<input
id="url"
placeholder="Paste your MP4 or HLS (.m3u8) URL here">

<button onclick="playVideo()">Play</button>

<video id="player" controls playsinline></video>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>

const player = new Plyr('#player');

const params = new URLSearchParams(window.location.search);
const videoUrl = params.get("video");

if (videoUrl) {
    const video = document.getElementById("player");

    video.src = decodeURIComponent(videoUrl);

    video.load();

    video.play().catch(() => {
        console.log("Autoplay blocked");
    });
}

function playVideo() {
    const url = document.getElementById("url").value;
    const video = document.getElementById("player");

    video.src = url;
    video.load();
    video.play();
}

</script>

</body>
</html>
