<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
<title>ANiX Video Stream</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="app">

<header class="topbar">
    <h1 class="logo">ANiX Video Stream</h1>
</header>

<div class="player-box">

<div id="videoTitle" class="video-title">
No Video Loaded
</div>

<video id="player" playsinline></video>

<div class="controls">

<button id="rewind" class="icon-btn">
<i class="fa-solid fa-rotate-left"></i>
<span>10</span>
</button>

<button id="play" class="play-btn">
<i class="fa-solid fa-play"></i>
</button>

<button id="forward" class="icon-btn">
<i class="fa-solid fa-rotate-right"></i>
<span>10</span>
</button>

<input
id="seek"
type="range"
value="0">

<div class="time">
<span id="current">00:00</span>
<span>/</span>
<span id="duration">00:00</span>
</div>

<button id="volumeBtn" class="icon-btn">
<i class="fa-solid fa-volume-high"></i>
</button>

<button id="settings" class="icon-btn">
<i class="fa-solid fa-gear"></i>
</button>

<button id="pip" class="icon-btn">
<i class="fa-regular fa-clone"></i>
</button>

<button id="fullscreen" class="icon-btn">
<i class="fa-solid fa-expand"></i>
</button>

</div>

<input
id="volume"
type="range"
min="0"
max="1"
step="0.01"
value="1">

<select id="speed">
<option value="0.5">0.5x</option>
<option value="1" selected>1x</option>
<option value="1.25">1.25x</option>
<option value="1.5">1.5x</option>
<option value="1.75">1.75x</option>
<option value="2">2x</option>
</select>

<select id="audioTrack"></select>

</div>

<div class="url-box">

<input
id="url"
placeholder="Paste MP4 / M3U8 URL">

<button id="load">
Load Video
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
