<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<h1 class="logo">
    ANiX <span>ViDEO STREAM</span>
</h1>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}
.container{
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}
input{
    width:100%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:none;
}
button{
    margin-top:10px;
    padding:12px 25px;
    background:#6d28d9;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
video{
    width:100%;
}
    .logo span{
    color:#ffffff;
    -webkit-text-fill-color:#ffffff;
}
    .logo{
    text-align:center;
    font-size:48px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:6px;
    font-family:'Arial Black',sans-serif;
    background:linear-gradient(
        90deg,
        #ff0000,
        #ff0077,
        #9d00ff,
        #6f00ff,
        #ff0000
    );
    background-size:400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:
        gradientMove 6s linear infinite,
        glow 1.5s ease-in-out infinite alternate,
        float 4s ease-in-out infinite;
}

@keyframes gradientMove{
    0%{background-position:0%;}
    100%{background-position:400%;}
}

@keyframes glow{
    from{
        filter:
        drop-shadow(0 0 5px #ff0055)
        drop-shadow(0 0 10px #ff0055)
        drop-shadow(0 0 20px #a200ff);
    }

    to{
        filter:
        drop-shadow(0 0 15px #ff0055)
        drop-shadow(0 0 30px #ff0055)
        drop-shadow(0 0 60px #9d00ff);
    }
}

@keyframes float{
    0%{
        transform:translateY(0px) scale(1);
    }

    50%{
        transform:translateY(-3px) scale(1.02);
    }

    100%{
        transform:translateY(0px) scale(1);
    }
}
</style>

</head>
<body>

<div class="container">

<h2>ANiX Video Player</h2>

<input
id="url"
placeholder="Paste your MP4 or HLS (.m3u8) URL here">

<button onclick="playVideo()">Play</button>

<video id="player" controls playsinline></video>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>

const player = new Plyr('#player');

const params = new URLSearchParams(window.location.search);
const videoUrl = params.get("video");

if (videoUrl) {
    const video = document.getElementById("player");

    video.src = decodeURIComponent(videoUrl);

    video.load();

    video.play().catch(() => {
        console.log("Autoplay blocked");
    });
}

function playVideo() {
    const url = document.getElementById("url").value;
    const video = document.getElementById("player");

    video.src = url;
    video.load();
    video.play();
}

</script>

</body>
</html>
