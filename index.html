<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ANiX VIDEO STREAM</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<div class="app">

<header class="topbar">

<h1 class="logo">
<span class="logo-anix">ANiX</span>
<span class="logo-video">VIDEO</span>
<span class="logo-stream">STREAM</span>
</h1>

</header>

<div class="player-box">

<div id="videoTitle" class="video-title">
No Video Loaded
</div>

<video
id="player"
playsinline
preload="metadata">

<track
id="subtitleTrack"
kind="subtitles"
label="Subtitle"
srclang="en">

</video>

<div class="center-controls">

    <button id="rewind" class="icon-btn">
        <i class="fa-solid fa-rotate-left"></i>
        <span>10</span>
    </button>

    <button id="play" class="play-btn">
        <i class="fa-solid fa-play"></i>
    </button>

    <button id="forward" class="icon-btn">
        <i class="fa-solid fa-rotate-right"></i>
        <span>10</span>
    </button>

</div>

    <!-- Row 2 -->

<div class="controls">
    <div class="controls-middle">

        <input
        id="seek"
        type="range"
        min="0"
        max="100"
        value="0">

    </div>

    <!-- Row 3 -->

    <div class="controls-bottom">

        <div class="time">

            <span id="current">00:00</span>

            <span>/</span>

            <span id="duration">00:00</span>

        </div>

        <button id="volumeBtn" class="icon-btn">
            <i class="fa-solid fa-volume-high"></i>
        </button>

        <button id="settings" class="icon-btn">
            <i class="fa-solid fa-gear"></i>
        </button>

        <button id="pip" class="icon-btn">
            <i class="fa-regular fa-clone"></i>
        </button>

        <button id="fullscreen" class="icon-btn">
            <i class="fa-solid fa-expand"></i>
        </button>

    </div>

</div>

<!-- SETTINGS PANEL -->

<div id="settingsMenu" class="settings-menu">

<div class="settings-tabs">

<button id="tabSpeed" class="tab active" title="Playback Speed">

<span class="material-symbols-outlined">
speed
</span>

</button>

<button id="tabAudio" class="tab" title="Audio Tracks">

<span class="material-symbols-outlined">
headphones
</span>

</button>

<button id="tabSubtitle" class="tab" title="Subtitles">

<span class="material-symbols-outlined">
closed_caption
</span>

</button>

<button id="closeSettings" class="tab close-tab" title="Close">

<span class="material-symbols-outlined">
close
</span>

</button>

</div>

<div id="settingsContent">

<!-- Dynamic Content -->

</div>

</div>

</div>
<!-- player-box END -->

<div class="url-box">

<input
id="url"
type="text"
placeholder="Paste MP4 / M3U8 / Direct Video URL">

<button id="load">
Load Video
</button>

</div>

<!-- Hidden Controls -->

<input
id="volume"
type="range"
min="0"
max="1"
step="0.01"
value="1"
hidden>

<input
id="subtitleFile"
type="file"
accept=".vtt,.srt"
hidden>

<select id="speed" hidden></select>

<select id="audioTrack" hidden></select>

</div>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

<script src="ffmpeg.js"></script>

<script src="script.js"></script>

</body>

</html>
