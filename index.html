<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANiX Video Stream</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

<header class="topbar">
    <h1 class="logo">ANiX Video Stream</h1>
</header>

<div class="player-box">

<div id="videoTitle" class="video-title">
    No Video Loaded
</div>
    <video id="player" playsinline></video>

<div class="controls">

<button id="rewind">⏪ 10</button>

<button id="play">▶</button>

<button id="forward">10 ⏩</button>

<input id="seek" type="range" value="0">

<div class="time">
<span id="current">00:00</span>
/
<span id="duration">00:00</span>
</div>

<button id="fullscreen">⛶</button>

</div>
<input
id="volume"
type="range"
min="0"
max="1"
step="0.01"
value="1">

<select id="speed">
    <option value="0.5">0.5x</option>
    <option value="1" selected>1x</option>
    <option value="1.5">1.5x</option>
    <option value="2">2x</option>
</select>

<select id="audioTrack"></select>

<button id="pip">PiP</button>
</div>

<div class="url-box">

<input
id="url"
placeholder="Paste MP4 or HLS URL">

<button id="load">
Load Video
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
